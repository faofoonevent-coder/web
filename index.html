<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Faofoon Event</title>

  <style>
    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      font-family:Arial,sans-serif;
      background:#f5f7fb;
    }

    /* หน้าเมนู */
    #menuPage{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:20px;
      width:100%;
      height:100vh;
      padding:20px;
    }

    .title{
      font-size:32px;
      font-weight:bold;
      color:#222;
      margin-bottom:20px;
    }

    .menuBtn{
      width:100%;
      max-width:320px;
      padding:18px 20px;
      border:none;
      border-radius:18px;
      font-size:20px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
      color:#fff;
    }

    .menuBtn:hover{
      transform:scale(1.03);
    }

    .questionBtn{
      background:#2563eb;
    }

    .surveyBtn{
      background:#16a34a;
    }

    /* iframe */
    #framePage{
      display:none;
      width:100%;
      height:100vh;
      position:relative;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }

    /* ปุ่มกลับ */
    .backBtn{
      position:fixed;
      top:15px;
      left:15px;
      z-index:999;
      border:none;
      border-radius:12px;
      padding:10px 16px;
      background:#111827;
      color:#fff;
      font-size:16px;
      cursor:pointer;
    }

    @media(max-width:768px){

      .title{
        font-size:26px;
        text-align:center;
      }

      .menuBtn{
        font-size:18px;
        padding:16px;
      }

    }
  </style>
</head>

<body>

  <!-- หน้าเมนู -->
  <div id="menuPage">
    <div class="title">
      Faofoon Event
    </div>

    <button class="menuBtn questionBtn"
            onclick="openPage('https://script.google.com/macros/s/AKfycbxdrp4z1h02PNenWYE1Zzltanv0ey-2xprfQTyli3X-tZDzw49H9mZ2dHJk924Ixs5CxA/exec')">
      ระบบส่งคำถาม
    </button>

    <button class="menuBtn surveyBtn"
            onclick="openPage('https://script.google.com/macros/s/AKfycbxKKavRNq6-wg4QRTbKmq9MqrK6oNB0_E4f3OJOhn25AGne1rnjbvNp85v6X_ARkqUM/exec')">
      แบบประเมินความพึงพอใจ
    </button>
  </div>

  <!-- หน้า iframe -->
  <div id="framePage">
    <button class="backBtn"
            onclick="goBack()">
      ← กลับ
    </button>

    <iframe id="mainFrame"></iframe>
  </div>

  <script>

    function openPage(url){

      document.getElementById("menuPage").style.display = "none";

      document.getElementById("framePage").style.display = "block";

      document.getElementById("mainFrame").src = url;

    }

    function goBack(){

      document.getElementById("framePage").style.display = "none";

      document.getElementById("menuPage").style.display = "flex";

      document.getElementById("mainFrame").src = "";

    }

  </script>

</body>
</html>
